name: R-ONE Probe (diagnostic)

# 개발 샌드박스는 외부 호스트가 전부 차단되어 R-ONE 을 직접 호출할 수 없다.
# 이 워크플로는 GitHub Actions(네트워크+시크릿 사용 가능)를 네트워크 프록시로 사용해
# 실제 R-ONE 응답을 받아 rone_probe_result.txt 로 커밋한다(브랜치로 push back).
# push 트리거는 probe 스크립트/워크플로 변경 시에만 발화하고, 결과 파일(.txt) push 는
# paths 에 안 걸리고 커밋 메시지에 [skip ci] 가 있어 재실행 루프가 발생하지 않는다.
on:
  push:
    branches: [claude/relaxed-planck-8NFtZ]
    paths:
      - 'scripts/rone_probe.py'
      - '.github/workflows/rone-probe.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rone-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance pykrx

      - name: Run R-ONE probe
        env:
          REALESTATE_API_KEY: ${{ secrets.REALESTATE_API_KEY }}
        run: python scripts/rone_probe.py

      - name: Commit probe result back to branch
        if: always()
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add rone_probe_result.txt
          if git diff --staged --quiet; then echo "변경 없음 — 커밋 건너뜀"; exit 0; fi
          git commit -m "chore: R-ONE probe 결과 업데이트 [skip ci]"
          for i in 1 2 3 4; do
            if git push origin "HEAD:${{ github.ref_name }}"; then echo "push 성공"; exit 0; fi
            echo "push 실패 — 재시도 $i"; git pull --rebase origin "${{ github.ref_name }}" || true; sleep $((i*3))
          done
          echo "::error::probe 결과 push 실패"; exit 1
