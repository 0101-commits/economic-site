name: R-ONE Probe (diagnostic)

# GitHub Actions 를 네트워크 프록시로 사용해 실제 R-ONE 응답을 받아 rone_probe_result.txt
# 로 커밋(push back)한다. push 트리거는 probe 파일 변경 시에만, 결과(.txt) push 는 paths 에
# 안 걸리고 [skip ci] 라 재실행 루프가 없다.
on:
  push:
    branches: [claude/relaxed-planck-8NFtZ]
    paths:
      - 'scripts/rone_probe.py'
      - '.github/workflows/rone-probe.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: rone-probe
  cancel-in-progress: false

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}
          fetch-depth: 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install requests
      - name: Run R-ONE probe
        env:
          REALESTATE_API_KEY: ${{ secrets.REALESTATE_API_KEY }}
        run: python scripts/rone_probe.py
      - name: Commit probe result
        if: always()
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add rone_probe_result.txt
          if git diff --staged --quiet; then echo "변경 없음"; exit 0; fi
          git commit -m "chore: R-ONE probe 결과 [skip ci]"
          for i in 1 2 3 4; do
            git push origin "HEAD:${{ github.ref_name }}" && exit 0
            git pull --rebase origin "${{ github.ref_name }}" || true; sleep $((i*3))
          done
          echo "::error::probe push 실패"; exit 1
