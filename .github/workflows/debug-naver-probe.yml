name: Debug Naver Investor Probe (임시)

# 투자자별 순매매 수집 실패 원인 진단용 임시 워크플로 — 진단 후 삭제 예정.
on:
  workflow_dispatch:
  push:
    branches: ['claude/nice-hopper-k4g29e']
    paths:
      - 'scripts/probe_naver_investor.py'
      - '.github/workflows/debug-naver-probe.yml'

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
      - run: pip install requests beautifulsoup4 lxml
      - run: python scripts/probe_naver_investor.py
