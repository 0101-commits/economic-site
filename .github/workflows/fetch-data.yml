name: Market Data Fetch (Hourly)

# 매 시간 정각 자동 실행 (UTC 기준)
# 주의: GitHub Actions 스케줄은 기본 브랜치(main)에 있을 때 활성화됩니다.
# 개발 중에는 workflow_dispatch로 수동 실행 가능합니다.
on:
  schedule:
    - cron: '0 * * * *'    # 매 시간 정각 (KST 기준 매 정시)
  workflow_dispatch:        # 수동 실행 허용

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      - name: Fetch market data
        env:
          KRX_API_KEY:        ${{ secrets.KRX_API_KEY }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY:       ${{ secrets.ECOS_API_KEY }}
          REALESTATE_API_KEY: ${{ secrets.REALESTATE_API_KEY }}
          KOSIS_API_KEY:      ${{ secrets.KOSIS_API_KEY }}
          # 신규 API 키 — 사용자 발급 키를 GitHub Secrets 에 추가해야 함
          # 공공데이터포털 통합 키 (data.go.kr): 국토부 실거래가, 금융위, KOTRA, KOSIS, 농수산식품 등 50+ 서비스
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          # 한국수출입은행 환율/금리 API 키
          EXIM_API_KEY:       ${{ secrets.EXIM_API_KEY }}
        run: python scripts/fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            git commit -m "data: 시장 데이터 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          fi
