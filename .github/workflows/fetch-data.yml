name: Market Data Fetch (Hourly + Daily 9AM KST)

# 자동 실행 스케줄 (UTC 기준; GitHub Actions 는 UTC 만 인식)
# 1) 매 시간 정각 — 시장 시간대 실시간 가격 갱신
# 2) 매일 KST 09:00 (= UTC 00:00) — 경제 캘린더·뉴스·통계 풀 갱신 트리거
# 주의: GitHub Actions 스케줄은 기본 브랜치(main)에 있을 때만 활성화됩니다.
# 개발 중에는 workflow_dispatch로 수동 실행 가능합니다.
on:
  schedule:
    - cron: '0 * * * *'    # 매 시간 정각 (시장 데이터)
    - cron: '0 0 * * *'    # KST 09:00 (UTC 00:00) — 매일 아침 종합 갱신
    - cron: '30 0 * * *'   # KST 09:30 (UTC 00:30) — 9AM 데이터 미수집 대비 보강
  workflow_dispatch:        # 수동 실행 허용

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests yfinance

      # KIS 토큰 영속 캐시 — 한국투자증권 API 는 토큰 1일 1회 발급 권장 (24h 유효).
      # 잦은 발급 시 카카오톡 알람·이용 제한이 발생하므로 GHA cache 액션으로
      # 런 간 토큰 파일을 보존하여 매 시간 새 토큰을 발급하는 일을 막는다.
      # 캐시 키 일자(YYYY-MM-DD) 가 바뀌면 자연스럽게 새 토큰 발급 (=하루 1회).
      - name: Restore KIS token cache
        id: kis-cache
        uses: actions/cache@v4
        with:
          path: .kis_token_cache.json
          key: kis-token-${{ github.run_started_at }}
          restore-keys: |
            kis-token-

      - name: Fetch market data
        env:
          KRX_API_KEY:        ${{ secrets.KRX_API_KEY }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY:       ${{ secrets.ECOS_API_KEY }}
          REALESTATE_API_KEY: ${{ secrets.REALESTATE_API_KEY }}
          KOSIS_API_KEY:      ${{ secrets.KOSIS_API_KEY }}
          # 신규 API 키 — 사용자 발급 키를 GitHub Secrets 에 추가해야 함
          # 공공데이터포털 통합 키 (data.go.kr): 국토부 실거래가, 금융위, KOTRA, KOSIS, 농수산식품 등 50+ 서비스
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          # 한국수출입은행 환율/금리 API 키
          EXIM_API_KEY:       ${{ secrets.EXIM_API_KEY }}
          # 한국투자증권 KIS API — Secrets 에 KIS_APP_KEY / KIS_APP_SECRET 설정 시 사용
          KIS_APP_KEY:        ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:     ${{ secrets.KIS_APP_SECRET }}
          KIS_TOKEN_FILE:     .kis_token_cache.json
        run: python scripts/fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add data.json
          if git diff --staged --quiet; then
            echo "변경 사항 없음 — 커밋 건너뜀"
          else
            git commit -m "data: 시장 데이터 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push origin HEAD
          fi
