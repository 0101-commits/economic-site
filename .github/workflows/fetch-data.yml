name: Market Data Fetch (Market-hours 10min + Daily 9AM/4PM/10PM KST)

# 자동 실행 스케줄 (UTC 기준; GitHub Actions 는 UTC 만 인식)
# 1) 매 시간 정각 — 24시간 시세 베이스라인 갱신
# 2) 한국 장중(평일 09:00–15:30 KST = 00:00–06:30 UTC) 10분마다 — Top10·지수 신속 반영
# 3) 미국 장중(평일 22:30–06:00 KST = 13:30–21:00 UTC) 10분마다 — 미 지수·VIX 신속 반영
# 4) 매일 KST 09:00 / 16:00 / 22:00 — 경제 캘린더·뉴스·통계 풀 갱신 트리거
# 주의: GitHub Actions 스케줄은 기본 브랜치(main)에 있을 때만 활성화됩니다.
#       또한 스케줄은 best-effort 라 혼잡 시 지연/누락될 수 있어, 프런트엔드가
#       장중 1분마다 클라이언트 API 로 직접 동기화(semi-실시간)하는 것을 1차 수단으로 둠.
# 개발 중에는 workflow_dispatch로 수동 실행 가능합니다.
on:
  schedule:
    - cron: '0 * * * *'      # 매 시간 정각 (24h 시세 베이스라인)
    # ── 장중 고빈도 (평일) — '오전 데이터가 그대로 유지' 문제 해소 ──
    - cron: '*/10 0-6 * * 1-5'   # 한국 장중 10분마다 (00:00–06:50 UTC = 09:00–15:50 KST)
    - cron: '*/10 13-21 * * 1-5' # 미국 장중 10분마다 (13:00–21:50 UTC = 22:00–06:50 KST)
    # ── 일일 종합 갱신 트리거 ──
    - cron: '0 0 * * *'      # KST 09:00 (UTC 00:00) — 매일 아침 종합 갱신
    - cron: '30 0 * * *'     # KST 09:30 (UTC 00:30) — 9AM 데이터 미수집 대비 보강
    - cron: '0 7 * * *'      # KST 16:00 (UTC 07:00) — 한국 장 마감 직후 종합 갱신
    - cron: '30 7 * * *'     # KST 16:30 (UTC 07:30) — 4PM 데이터 미수집 대비 보강
    - cron: '0 13 * * *'     # KST 22:00 (UTC 13:00) — 매일 저녁 종합 갱신 (당일 발표 반영)
    - cron: '30 13 * * *'    # KST 22:30 (UTC 13:30) — 10PM 데이터 미수집 대비 보강
  workflow_dispatch:        # 수동 실행 허용
  # 🔔 Worker cron(*/5 장중)이 정시성 보강용으로 깨우는 on-demand 런 — GHA schedule(*/10) 드롭에
  #    영향받지 않아 시세·서킷브레이커(check_halts) 데이터를 장중 5분 주기로 안정 갱신한다.
  #    concurrency 직렬화 + fetch_data 부분실패 시 이전값 보존이라 schedule 과 겹쳐도 멱등·안전.
  repository_dispatch:
    types: [fetch-data]
  # ── 코드/워크플로 변경 시 즉시 데이터 재생성 ──
  # 스케줄 cron 은 GitHub 측 지연으로 늦게/누락 발화할 수 있어, fetch 로직이나 본
  # 워크플로가 main 에 머지되면 곧바로 한 번 돌려 data.json 을 최신 코드로 갱신한다.
  # paths 를 두 파일로 한정 → data.json 커밋(봇)은 매칭되지 않아 재귀 실행이 없다.
  push:
    branches: [main]
    paths:
      - 'scripts/fetch_data.py'
      - '.github/workflows/fetch-data.yml'

# 동시 실행 직렬화 — 매시간 cron(0 * * * *) 과 일일 cron(0 0/0 7/0 13) 이 같은 정각에
# 함께 발화하면 두 런이 동시에 main 에 push 하여 한쪽이 non-fast-forward 로 거부·실패한다.
# concurrency 그룹으로 한 번에 하나만 실행(나머지는 대기)하여 push 경쟁을 제거한다.
concurrency:
  group: market-data-fetch
  cancel-in-progress: false

permissions:
  contents: write

# 모든 JS 액션(actions/cache@v4 등)을 Node 24 로 강제 실행 — 런 로그의 'Node.js 20 deprecated'
# ⚠ 경고 주석 제거(런을 '경고 0개의 green' 으로 유지). 2026-06-16 GitHub 이 Node24 를 기본으로
# 강제 전환하므로 명시적으로 켜 둔다. 데이터 수집/커밋 동작에는 영향 없음.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        # pykrx: KRX 정보데이터시스템(data.krx.co.kr) 직접 호출 — 종목·ETF·투자자별 매매동향의 PRIMARY 소스.
        # ⚠️ 버전 고정 이유: KRX 가 2026 초부터 정보데이터시스템 데이터에 '로그인'을 요구하기 시작했고,
        #    pykrx 는 1.2.x 부터 이에 대응하는 로그인 지원(KRX_ID/KRX_PW 환경변수)을 추가했다.
        #    install 을 무고정으로 두면 런마다 최신 pykrx 로 드리프트해 동작이 바뀌므로 1.2.8 로 고정한다.
        #    KRX_ID/KRX_PW 시크릿이 설정돼 있으면 pykrx 가 자동 로그인해 투자자별 순매매·Top10 이 정상 수집된다.
        #    (시크릿 미설정 시 익명 접근을 시도하나 KRX 가 거부 → 투자자별 데이터가 비게 됨.)
        #    beautifulsoup4/lxml: 투자자별 순매매 Naver 폴백 파서 + 운임지수 스크래핑에 사용.
        #    (pykrx 의 전이 의존성에 기대지 않고 명시 설치 — Naver 폴백이 'bs4 미설치'로 비는 일 방지.)
        run: pip install requests yfinance "pykrx==1.2.8" beautifulsoup4 lxml

      # KIS 토큰 영속 캐시 — 한국투자증권 API 는 토큰 1일 1회 발급 권장 (24h 유효).
      # 잦은 발급 시 카카오톡 알람·이용 제한이 발생하므로 GHA cache 액션으로
      # 런 간 토큰 파일을 보존하여 매 시간 새 토큰을 발급하는 일을 막는다.
      # ⚠ key 는 run_id 로 매 런 유일해야 한다 — 이전의 github.run_started_at 은 GHA 표현식
      #   컨텍스트에 없는 속성이라 빈 문자열로 평가됐고, key 가 항상 'kis-token-' 으로
      #   primary hit → actions/cache 가 갱신본을 절대 저장하지 않는 버그였다.
      - name: Restore KIS token cache
        id: kis-cache
        uses: actions/cache@v4
        with:
          path: .kis_token_cache.json
          key: kis-token-${{ github.run_id }}
          restore-keys: |
            kis-token-

      # 실 제조업 PMI(50기준) 웹 스크래핑 영속 캐시 — 스크래핑 성공값을 런 간 보존해
      # 소스 일시 차단 시에도 BCI 로 깜빡이지 않고 최신 PMI 를 유지한다.
      # ⚠ key 는 run_id 로 매 런 유일해야 저장된다 (위 KIS 캐시와 동일한 버그 수정 —
      #   이전엔 스크래핑이 성공해도 갱신된 .pmi_cache.json 이 저장된 적이 없었다).
      - name: Restore PMI scrape cache
        uses: actions/cache@v4
        with:
          path: .pmi_cache.json
          key: pmi-cache-${{ github.run_id }}
          restore-keys: |
            pmi-cache-

      - name: Fetch market data
        env:
          KRX_API_KEY:        ${{ secrets.KRX_API_KEY }}
          # KRX 정보데이터시스템 로그인 (pykrx 1.2.x) — 2026 부터 KRX 가 로그인을 요구.
          # data.krx.co.kr 무료 회원가입 후 아이디/비밀번호를 Secrets(KRX_ID, KRX_PW)에 등록하면
          # 투자자별 순매매 동향·종목 Top10 등 pykrx 수집이 정상화된다. 미설정 시 익명 접근 시도(거부될 수 있음).
          KRX_ID:             ${{ secrets.KRX_ID }}
          KRX_PW:             ${{ secrets.KRX_PW }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY:       ${{ secrets.ECOS_API_KEY }}
          REALESTATE_API_KEY: ${{ secrets.REALESTATE_API_KEY }}
          KOSIS_API_KEY:      ${{ secrets.KOSIS_API_KEY }}
          # 신규 API 키 — 사용자 발급 키를 GitHub Secrets 에 추가해야 함
          # 공공데이터포털 통합 키 (data.go.kr): 국토부 실거래가, 금융위, KOTRA, KOSIS, 농수산식품 등 50+ 서비스
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          # 한국수출입은행 환율/금리 API 키
          EXIM_API_KEY:       ${{ secrets.EXIM_API_KEY }}
          # 한국투자증권 KIS API — Secrets 에 KIS_APP_KEY / KIS_APP_SECRET 설정 시 사용
          # KIS_ENABLED=0 (기본): 카카오톡 알람 차단을 위해 KIS 토큰 발급 비활성화.
          # pykrx 가 KOSPI/KOSDAQ 등락 데이터를 직접 가져오므로 KIS 가 없어도 정상 동작.
          # KIS 사용을 원하면 워크플로우 변수에 KIS_ENABLED: '1' 설정.
          KIS_APP_KEY:        ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:     ${{ secrets.KIS_APP_SECRET }}
          KIS_ENABLED:        ${{ vars.KIS_ENABLED || '0' }}
          KIS_TOKEN_FILE:     .kis_token_cache.json
          # 네이버 검색 OpenAPI — Google News 가 차단된 카테고리 보강에 사용 (선택)
          # https://developers.naver.com/apps/ 에서 발급, 일 25,000회 무료
          NAVER_CLIENT_ID:    ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # Alpha Vantage API — 미국 경제지표/원자재/FX 보강 (일 25회 한도)
          # https://www.alphavantage.co/support/#api-key 에서 발급
          # Secrets 미설정 시 Alpha Vantage 보강은 건너뜀 (코드에 기본 키 하드코딩 금지 — 공개 저장소).
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          # 일일 갱신 트리거 (KST 09:00/16:00/22:00) 시점에 Alpha Vantage 보강을 강제 활성화.
          # 매시간 cron 에서는 기본 비활성 (rate-limit 보호). 코드 자동 감지도 있음.
          AV_FETCH_FULL: ${{ (github.event.schedule == '0 0 * * *' || github.event.schedule == '0 7 * * *' || github.event.schedule == '0 13 * * *') && '1' || '' }}
        run: python scripts/fetch_data.py

      # 🤖 오늘의 매크로 3줄 요약 — data.json 의 aiBriefing 키 생성/갱신.
      # GEMINI_API_KEY / OPENAI_API_KEY 시크릿이 있으면 LLM 요약, 없으면 규칙 기반 폴백.
      # 스크립트는 어떤 경우에도 exit 0 (빌드 파이프라인을 깨지 않음).
      - name: Generate AI macro briefing
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python scripts/ai_briefing.py

      # 🛡 데이터 무결성 게이트 — 스키마/핵심 시계열 검증 실패 시 여기서 중단되어
      # 커밋이 일어나지 않고 직전 정상 data.json 이 유지된다(fail-safe).
      - name: Validate data.json (스키마·최소 길이)
        run: python scripts/validate_data.py

      # 🚨 시장중단(서킷브레이커·사이드카) 카카오톡 — data.json.marketHalts 의 신규 발동/해제만 발송.
      # best-effort: 실패해도 데이터 커밋을 막지 않도록 continue-on-error.
      - name: Send market-halt alerts (Kakao)
        continue-on-error: true
        env:
          KAKAO_REST_API_KEY:  ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
        run: python scripts/check_halts.py

      - name: Commit and push data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          branch="${GITHUB_REF_NAME:-main}"
          if git diff --quiet -- data.json data_meta.json halts_state.json && git diff --staged --quiet -- data.json data_meta.json halts_state.json; then
            echo "변경 사항 없음 — 커밋 건너뜀"; exit 0
          fi
          msg="data: 시장 데이터 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
          cp data.json /tmp/data.json.run
          cp data_meta.json /tmp/data_meta.json.run
          cp halts_state.json /tmp/halts_state.json.run 2>/dev/null || true
          git add data.json data_meta.json
          [ -f halts_state.json ] && git add halts_state.json || true
          git commit -m "$msg" -q || true
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "push 성공 (시도 ${attempt})"; exit 0
            fi
            echo "push 실패 (시도 ${attempt}) — 원격 ${branch} 최신 위에 산출물만 재적용"
            git fetch origin "${branch}" || true
            git reset --hard "origin/${branch}" 2>/dev/null || git reset --hard FETCH_HEAD || true
            cp /tmp/data.json.run data.json
            cp /tmp/data_meta.json.run data_meta.json
            cp /tmp/halts_state.json.run halts_state.json 2>/dev/null || true
            git add data.json data_meta.json
            [ -f halts_state.json ] && git add halts_state.json || true
            if git diff --staged --quiet -- data.json data_meta.json halts_state.json; then
              echo "원격이 이미 최신 — 종료"; exit 0
            fi
            git commit -m "$msg" -q || true
            sleep $((attempt * 3))
          done
          echo "::error::data.json push 실패 (재시도 소진)"; exit 1
