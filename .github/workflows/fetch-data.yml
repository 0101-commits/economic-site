name: Market Data Fetch (Hourly + Daily 9AM/4PM/10PM KST)

# 자동 실행 스케줄 (UTC 기준; GitHub Actions 는 UTC 만 인식)
# 1) 매 시간 정각 — 시장 시간대 실시간 가격 갱신
# 2) 매일 KST 09:00 (= UTC 00:00) — 경제 캘린더·뉴스·통계 풀 갱신 트리거 (아침)
# 3) 매일 KST 16:00 (= UTC 07:00) — 한국 마감 직후 종합 갱신 (Top10·시세·뉴스)
# 4) 매일 KST 22:00 (= UTC 13:00) — 미국 시장 개장 후·당일 발표 지표 반영 (저녁)
# 주의: GitHub Actions 스케줄은 기본 브랜치(main)에 있을 때만 활성화됩니다.
# 개발 중에는 workflow_dispatch로 수동 실행 가능합니다.
on:
  schedule:
    - cron: '0 * * * *'    # 매 시간 정각 (시장 데이터)
    - cron: '0 0 * * *'    # KST 09:00 (UTC 00:00) — 매일 아침 종합 갱신
    - cron: '30 0 * * *'   # KST 09:30 (UTC 00:30) — 9AM 데이터 미수집 대비 보강
    - cron: '0 7 * * *'    # KST 16:00 (UTC 07:00) — 한국 장 마감 직후 종합 갱신
    - cron: '30 7 * * *'   # KST 16:30 (UTC 07:30) — 4PM 데이터 미수집 대비 보강
    - cron: '0 13 * * *'   # KST 22:00 (UTC 13:00) — 매일 저녁 종합 갱신 (당일 발표 반영)
    - cron: '30 13 * * *'  # KST 22:30 (UTC 13:30) — 10PM 데이터 미수집 대비 보강
  workflow_dispatch:        # 수동 실행 허용

# 동시 실행 직렬화 — 매시간 cron(0 * * * *) 과 일일 cron(0 0/0 7/0 13) 이 같은 정각에
# 함께 발화하면 두 런이 동시에 main 에 push 하여 한쪽이 non-fast-forward 로 거부·실패한다.
# concurrency 그룹으로 한 번에 하나만 실행(나머지는 대기)하여 push 경쟁을 제거한다.
concurrency:
  group: market-data-fetch
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        # pykrx: KRX 정보데이터시스템 직접 호출 — 키 없음, 카카오톡 알람 없음, 가장 안정적
        # 종목·ETF 상승/하락 Top10 의 PRIMARY 데이터 소스 (Naver/KIS 의 신뢰성 문제 우회)
        run: pip install requests yfinance pykrx

      # KIS 토큰 영속 캐시 — 한국투자증권 API 는 토큰 1일 1회 발급 권장 (24h 유효).
      # 잦은 발급 시 카카오톡 알람·이용 제한이 발생하므로 GHA cache 액션으로
      # 런 간 토큰 파일을 보존하여 매 시간 새 토큰을 발급하는 일을 막는다.
      # 캐시 키 일자(YYYY-MM-DD) 가 바뀌면 자연스럽게 새 토큰 발급 (=하루 1회).
      - name: Restore KIS token cache
        id: kis-cache
        uses: actions/cache@v4
        with:
          path: .kis_token_cache.json
          key: kis-token-${{ github.run_started_at }}
          restore-keys: |
            kis-token-

      - name: Fetch market data
        env:
          KRX_API_KEY:        ${{ secrets.KRX_API_KEY }}
          FRED_API_KEY:       ${{ secrets.FRED_API_KEY }}
          ECOS_API_KEY:       ${{ secrets.ECOS_API_KEY }}
          REALESTATE_API_KEY: ${{ secrets.REALESTATE_API_KEY }}
          KOSIS_API_KEY:      ${{ secrets.KOSIS_API_KEY }}
          # 신규 API 키 — 사용자 발급 키를 GitHub Secrets 에 추가해야 함
          # 공공데이터포털 통합 키 (data.go.kr): 국토부 실거래가, 금융위, KOTRA, KOSIS, 농수산식품 등 50+ 서비스
          DATA_GO_KR_API_KEY: ${{ secrets.DATA_GO_KR_API_KEY }}
          # 한국수출입은행 환율/금리 API 키
          EXIM_API_KEY:       ${{ secrets.EXIM_API_KEY }}
          # 한국투자증권 KIS API — Secrets 에 KIS_APP_KEY / KIS_APP_SECRET 설정 시 사용
          # KIS_ENABLED=0 (기본): 카카오톡 알람 차단을 위해 KIS 토큰 발급 비활성화.
          # pykrx 가 KOSPI/KOSDAQ 등락 데이터를 직접 가져오므로 KIS 가 없어도 정상 동작.
          # KIS 사용을 원하면 워크플로우 변수에 KIS_ENABLED: '1' 설정.
          KIS_APP_KEY:        ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET:     ${{ secrets.KIS_APP_SECRET }}
          KIS_ENABLED:        ${{ vars.KIS_ENABLED || '0' }}
          KIS_TOKEN_FILE:     .kis_token_cache.json
          # 네이버 검색 OpenAPI — Google News 가 차단된 카테고리 보강에 사용 (선택)
          # https://developers.naver.com/apps/ 에서 발급, 일 25,000회 무료
          NAVER_CLIENT_ID:    ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          # Alpha Vantage API — 미국 경제지표/원자재/FX 보강 (일 25회 한도)
          # https://www.alphavantage.co/support/#api-key 에서 발급
          # Secrets 미설정 시 코드의 기본 키가 사용됨 (개인 발급 키).
          ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
          # 일일 갱신 트리거 (KST 09:00/16:00/22:00) 시점에 Alpha Vantage 보강을 강제 활성화.
          # 매시간 cron 에서는 기본 비활성 (rate-limit 보호). 코드 자동 감지도 있음.
          AV_FETCH_FULL: ${{ (github.event.schedule == '0 0 * * *' || github.event.schedule == '0 7 * * *' || github.event.schedule == '0 13 * * *') && '1' || '' }}
        run: python scripts/fetch_data.py

      - name: Commit and push data.json
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          branch="${GITHUB_REF_NAME:-main}"
          if git diff --quiet -- data.json && git diff --staged --quiet -- data.json; then
            echo "변경 사항 없음 — 커밋 건너뜀"; exit 0
          fi
          msg="data: 시장 데이터 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
          # 외부/동시 커밋으로 push 가 거부되면 원격 최신 위에 재배치 후 재시도.
          # data.json 은 매 런마다 새로 생성되는 산출물이므로 '최신 런이 이긴다' 정책.
          for attempt in 1 2 3 4 5; do
            git add data.json
            git commit -m "$msg" -q || true
            if git push origin "HEAD:${branch}"; then
              echo "push 성공 (시도 ${attempt})"; exit 0
            fi
            echo "push 실패 (시도 ${attempt}) — 원격 ${branch} 동기화 후 재시도"
            git fetch origin "${branch}" || true
            git reset --soft "origin/${branch}" || true
            sleep $((attempt * 3))
          done
          echo "::error::data.json push 실패 (재시도 소진)"; exit 1
