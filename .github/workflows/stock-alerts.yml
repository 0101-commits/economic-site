name: Stock Alerts (KakaoTalk, 장중 5분)

# '투자 현황' 페이지에서 설정한 종목 알림(alerts_config.json)을 장중 5분마다 평가해
# 조건 충족 시 카카오톡으로 발송한다 (scripts/check_alerts.py).
#   - 한국 장중: 평일 09:00–15:40 KST (= UTC 00:00–06:40)
#   - 미국 장중: 평일 22:30–06:10 KST (= UTC 13:30–21:10)
# 도배 방지 발송 이력(alerts_state.json)은 매 런 커밋해 보존한다(하루 1회/1시간 쿨다운).
# 주의: GitHub schedule 은 best-effort 라 지연/누락될 수 있음 — 5분 주기로 평가해 조건
#       충족 후 보통 5분 내 안내한다. 단, 시세 데이터 자체는 무료 API 특성상 최대 15분
#       지연될 수 있으므로(별개 한계) 메시지엔 '15분 지연 데이터 기준' 문구를 유지한다.
on:
  schedule:
    - cron: '*/5 0-6 * * 1-5'    # 한국 장중 (00:00–06:55 UTC = 09:00–15:55 KST)
    - cron: '*/5 13-21 * * 1-5'  # 미국 장중 (13:00–21:55 UTC = 22:00–06:55 KST)
  workflow_dispatch: {}
  # 🔔 두 가지 repository_dispatch:
  #   • alerts-test — 프런트 '테스트 발송' 버튼 → Worker POST /portfolio/test. 장중/쿨다운 가드를
  #     무시하고 즉시 평가·발송(이력 미갱신). check_alerts.py 가 ALERTS_TEST=true 로 인식.
  #   • alerts-cron — Worker cron(*/5 장중)이 정시성 보강용으로 깨우는 정규 런. GHA schedule 드롭에
  #     영향받지 않아 5분 주기를 안정 보장. 정규 가드·이력 갱신 적용(ALERTS_TEST=false).
  repository_dispatch:
    types: [alerts-test, alerts-cron]

permissions:
  contents: write

# 발송 이력 커밋 경쟁 방지 — 한 번에 하나만 실행
concurrency:
  group: stock-alerts
  cancel-in-progress: false

jobs:
  check-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (최신 alerts_config.json)
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install requests

      - name: Check alerts & send KakaoTalk
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_FRIENDS: ${{ vars.KAKAO_FRIENDS || '1' }}
          # 'alerts-test' dispatch 만 테스트 런(가드 무시·이력 미갱신). 'alerts-cron'/schedule 은 정규 런.
          ALERTS_TEST: ${{ github.event_name == 'repository_dispatch' && github.event.action == 'alerts-test' }}
        run: python scripts/check_alerts.py

      - name: Commit alerts_state.json (발송 이력 — 도배 방지)
        run: |
          git config user.name  'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          branch="${GITHUB_REF_NAME:-main}"
          if [ ! -f alerts_state.json ]; then echo "상태 파일 없음 — 커밋 건너뜀"; exit 0; fi
          if git diff --quiet -- alerts_state.json && git diff --staged --quiet -- alerts_state.json; then
            echo "변경 사항 없음 — 커밋 건너뜀"; exit 0
          fi
          msg="alerts: 발송 이력 업데이트 $(date -u +'%Y-%m-%d %H:%M UTC')"
          # data.json 커밋과 동일한 '최신 런이 이긴다' 재시도 정책 — 상태 파일만 재적용
          cp alerts_state.json /tmp/alerts_state.json.run
          git add alerts_state.json
          git commit -m "$msg" -q || true
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${branch}"; then
              echo "push 성공 (시도 ${attempt})"; exit 0
            fi
            echo "push 실패 (시도 ${attempt}) — 원격 최신 위에 alerts_state.json 만 재적용"
            git fetch origin "${branch}" || true
            git reset --hard "origin/${branch}" 2>/dev/null || git reset --hard FETCH_HEAD || true
            cp /tmp/alerts_state.json.run alerts_state.json
            git add alerts_state.json
            if git diff --staged --quiet -- alerts_state.json; then
              echo "원격이 이미 최신 — 종료"; exit 0
            fi
            git commit -m "$msg" -q || true
            sleep $((attempt * 3))
          done
          echo "::error::alerts_state.json push 실패 (재시도 소진)"; exit 1
