name: KakaoTalk Daily Digest (10·15·18 KST)

# 매일 10:00 / 15:00 / 18:00 (KST) data.json 시황 요약을 카카오톡 '나에게 보내기'로 발송한다.
# (10시=아침 브리핑 / 15시=장중 점검 / 18시=마감 정리 — 발송 시각에 맞춰 제목이 자동으로 바뀐다.)
# GitHub Actions 스케줄은 UTC 기준이며 best-effort 라 몇 분 지연될 수 있다.
#
# 사전 설정(1회) — 저장소 루트 KAKAO_SETUP.md 참고:
#   GitHub → Settings → Secrets and variables → Actions 에 아래 2개 등록
#     - KAKAO_REST_API_KEY   : 카카오 개발자 앱 REST API 키
#     - KAKAO_REFRESH_TOKEN  : talk_message scope 로 발급한 refresh_token
#
# 테스트: Actions 탭에서 이 워크플로를 'Run workflow'(workflow_dispatch)로 즉시 수동 발송 가능.
on:
  schedule:
    - cron: '0 1 * * *'    # 10:00 KST (01:00 UTC) — 아침 시황
    - cron: '0 6 * * *'    # 15:00 KST (06:00 UTC) — 오후 시황
    - cron: '0 9 * * *'    # 18:00 KST (09:00 UTC) — 마감 시황
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: kakao-daily-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (최신 data.json)
        uses: actions/checkout@v5
        with:
          # 스케줄 발화는 기본 브랜치(main)에서 도므로 github.ref_name=main → 평소 동작 동일.
          # 수동 실행(workflow_dispatch)은 선택한 브랜치를 체크아웃 → 새 스크립트/데이터로 파일럿 가능.
          ref: ${{ github.ref_name || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Send KakaoTalk digest
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          # 커스텀(사용자 정의) 템플릿으로 보내려면 콘솔 템플릿 ID 를 Secrets 또는 Variables 에 등록.
          # 미설정 시 기본 피드 템플릿으로 발송. (둘 다 한 통 + 그날 차트 이미지)
          KAKAO_TEMPLATE_ID: ${{ secrets.KAKAO_TEMPLATE_ID || vars.KAKAO_TEMPLATE_ID }}
        run: python scripts/send_kakao_digest.py
