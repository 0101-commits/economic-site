name: KakaoTalk Daily Digest (10·15·22 KST)

# 매일 10시·15시·22시(KST)에 data.json 시황을 카카오톡 '나에게 보내기'로 한 통(피드: 차트 이미지 +
# 카테고리 행 + 버튼) 발송한다. 슬롯별 차트: 10시=나스닥·S&P500 / 15시=코스피·달러원 / 22시=코스피·나스닥.
#
# ⏰ 왜 schedule(cron)만 쓰지 않는가:
#   GitHub Actions 의 schedule 은 best-effort 라, '하루 몇 번만' 도는 워크플로는 정각에서 수십 분 밀리거나
#   아예 누락된다(실측: 이 워크플로의 스케줄 발송이 며칠째 통째로 드롭). 정각±몇 분 보장이 cron 으로는 불가능.
#   → 대신, 안정적으로(매 10분/매시간) 도는 데이터 수집 워크플로(fetch-data)가 끝날 때마다 workflow_run 으로
#     이 워크플로를 깨우고(=fetch-data 의 신뢰성 있는 주기에 올라탐), 아래 '발송 창' 게이트에서 지금이
#     타깃 시각(10/15/22시)일 때만 발송한다. fetch-data 는 정각 직후 갱신을 커밋하므로 보통 정각~몇 분 내 발송.
#   actions/cache 마커(슬롯+날짜)로 하루 슬롯당 한 번만 발송(중복 방지). schedule 백업도 함께 둔다.
#
# 사전 설정(1회) — 저장소 루트 KAKAO_SETUP.md 참고:
#   Settings → Secrets and variables → Actions: KAKAO_REST_API_KEY, KAKAO_REFRESH_TOKEN (필수)
#   (선택) 변수 KAKAO_CHARTS=0 으로 차트 끄기, KAKAO_TEMPLATE_ID 로 콘솔 커스텀 템플릿 폴백.
#
# 테스트: Actions 탭에서 'Run workflow'(workflow_dispatch) — 시각과 무관하게 즉시 발송.
on:
  workflow_run:
    workflows: ["Market Data Fetch (Market-hours 10min + Daily 9AM/4PM/10PM KST)"]
    types: [completed]
  schedule:
    # workflow_run 이 어떤 이유로 안 올 때를 대비한 백업(타깃 정각 직후 1~3분). 게이트가 시각으로 거른다.
    - cron: '0-2 1 * * *'    # 10:00–10:02 KST
    - cron: '0-2 6 * * *'    # 15:00–15:02 KST
    - cron: '0-2 13 * * *'   # 22:00–22:02 KST
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: kakao-daily-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      # ── 발송 창(window) 게이트 ──
      # 지금 KST 시각이 타깃(10/15/22시)인지 판정. 타깃 시각대에만 발송하고, 그 외엔 즉시 종료.
      # (fetch-data 완료가 매 10분/매시간 이 워크플로를 깨우므로, 타깃 시각의 '첫' 깨움에서 발송된다.)
      # 수동 실행(workflow_dispatch)은 시각과 무관하게 항상 발송.
      - name: 발송 창 판정
        id: gate
        env:
          EVENT: ${{ github.event_name }}
        run: |
          H=$(TZ=Asia/Seoul date +%-H)
          case "$H" in
            10) slot=morning ;;
            15) slot=midday ;;
            22) slot=close ;;
            *)  slot="" ;;
          esac
          if [ "$EVENT" = "workflow_dispatch" ]; then
            proceed=true; mslot=manual
          elif [ -n "$slot" ]; then
            proceed=true; mslot="$slot"
          else
            proceed=false; mslot=none
          fi
          echo "proceed=$proceed"               >> "$GITHUB_OUTPUT"
          echo "slot=$mslot"                     >> "$GITHUB_OUTPUT"
          echo "ckey=${slot:-none}"              >> "$GITHUB_OUTPUT"   # 캐시 키용 시각 기반 슬롯
          echo "date=$(TZ=Asia/Seoul date +%Y%m%d)" >> "$GITHUB_OUTPUT"
          echo "[gate] event=$EVENT KST=${H}시 proceed=$proceed slot=$mslot"

      - name: Checkout (최신 data.json)
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install chart deps
        if: steps.gate.outputs.proceed == 'true'
        run: pip install matplotlib requests

      # 중복 발송 방지 마커: 같은 슬롯이 그날 이미 발송했으면 cache-hit=true → 발송 건너뜀.
      # 수동 실행(slot=manual)은 마커를 쓰지 않아 언제든 발송된다.
      - name: 중복 발송 방지 마커 복원
        if: steps.gate.outputs.proceed == 'true' && steps.gate.outputs.slot != 'manual'
        id: marker
        uses: actions/cache@v4
        with:
          path: .kakao_sent_marker
          key: kakao-sent-${{ steps.gate.outputs.date }}-${{ steps.gate.outputs.ckey }}

      - name: Send KakaoTalk digest
        if: steps.gate.outputs.proceed == 'true' && steps.marker.outputs.cache-hit != 'true'
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_SLOT: ${{ steps.gate.outputs.slot }}
          KAKAO_CHARTS: ${{ vars.KAKAO_CHARTS || '1' }}
          KAKAO_TEMPLATE_ID: ${{ secrets.KAKAO_TEMPLATE_ID || vars.KAKAO_TEMPLATE_ID }}
        run: |
          python scripts/send_kakao_digest.py
          touch .kakao_sent_marker   # 발송 성공 후에만 마커 생성(실패 시 -e 로 중단 → 다음 깨움이 재시도)
