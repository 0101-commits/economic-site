name: KakaoTalk Digest (07·09·10·12·15·17·20·22 KST)

# 매일 07·09·10·12·15·17·20·22시(KST) :03 무렵 data.json 시황을 카카오톡 '나에게 보내기'로
# 한 통(피드: 차트 이미지 + 증시·환율·심리(VKOSPI 포함)·에너지·금속·곡물·운임(SCFI) + 버튼) 발송.
# 슬롯별 차트: 07·09시=S&P500·달러원 / 10·12·15·17시=코스피·달러원 / 20·22시=달러원·WTI.
# (차트는 당일 인트라데이 기준, 당일이 없으면 7일 일봉 폴백 — scripts/send_kakao_digest.py)
#
# ⏰ 트리거 우선순위 (GitHub schedule 이 best-effort 라 며칠씩 누락되는 문제 해소):
#   1) repository_dispatch(kakao-send) ← Cloudflare Worker 의 Cron Trigger 가 각 슬롯 :02(UTC)에
#      호출 → 잡 기동·발송까지 약 1분이 걸려 카카오 도착이 :03 부근이 된다. ★ 주 경로.
#      (설정: 저장소 루트 wrangler.jsonc 의 triggers.crons + Worker 시크릿 GH_DISPATCH_TOKEN. KAKAO_SETUP.md 참고)
#   2) schedule(:03 백업) — GitHub 스케줄이 살아 있을 때의 보조.
#   3) workflow_run — 데이터 수집(fetch-data) 완료 시에도 깨워 보조(타깃 시각일 때만 발송).
#   4) workflow_dispatch — 수동 즉시.
#   어느 경로로 깨워지든 아래 '발송 창' 게이트가 타깃 시각만 통과시키고, actions/cache 마커(슬롯+날짜)로
#   하루 슬롯당 한 번만 발송(중복 방지). 수동 실행은 마커 없이 항상 발송.
#
# 사전 설정 — 저장소 루트 KAKAO_SETUP.md 참고:
#   Settings → Secrets and variables → Actions: KAKAO_REST_API_KEY, KAKAO_REFRESH_TOKEN (필수)
#   (선택) 변수 KAKAO_CHARTS=0 으로 차트 끄기.
on:
  repository_dispatch:
    types: [kakao-send]
  schedule:
    # KST 07/09/10/12/15/17/20/22시 :03 = UTC 22/00/01/03/06/08/11/13시 :03 (백업 경로)
    - cron: '3 0,1,3,6,8,11,13,22 * * *'
  workflow_run:
    workflows: ["Market Data Fetch (Market-hours 10min + Daily 9AM/4PM/10PM KST)"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: kakao-daily-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      # ── 발송 창(window) 게이트 ──
      # repository_dispatch(Cloudflare cron) / workflow_dispatch(수동) 는 트리거 자체가 '보낼 때' 이므로 통과.
      # schedule / workflow_run 은 지금이 타깃 시각(07/09/10/12/15/17/20/22시)일 때만 통과(그 외 깨움은 즉시 종료).
      - name: 발송 창 판정
        id: gate
        env:
          EVENT: ${{ github.event_name }}
        run: |
          H=$(TZ=Asia/Seoul date +%-H)
          HOURS="7 9 10 12 15 17 20 22"
          # 가장 가까운 슬롯(항상 계산) — dispatch/수동에서 사용
          best=7; bd=99
          for h in $HOURS; do
            d=$(( H - h )); [ "$d" -lt 0 ] && d=$(( -d ))
            if [ "$d" -lt "$bd" ]; then bd=$d; best=$h; fi
          done
          nslot=$(printf 'h%02d' "$best")
          # 타깃 시각(정확히 그 시간대일 때만) — schedule/workflow_run 게이트용
          tslot=""
          case " $HOURS " in *" $H "*) tslot=$(printf 'h%02d' "$H") ;; esac
          case "$EVENT" in
            repository_dispatch) proceed=true; mslot="$nslot"; ckey="$nslot" ;;
            workflow_dispatch)   proceed=true; mslot=manual;   ckey="$nslot" ;;
            *) if [ -n "$tslot" ]; then proceed=true; mslot="$tslot"; ckey="$tslot"; else proceed=false; mslot=none; ckey=none; fi ;;
          esac
          echo "proceed=$proceed"                    >> "$GITHUB_OUTPUT"
          echo "slot=$mslot"                         >> "$GITHUB_OUTPUT"
          echo "ckey=$ckey"                          >> "$GITHUB_OUTPUT"
          echo "date=$(TZ=Asia/Seoul date +%Y%m%d)"  >> "$GITHUB_OUTPUT"
          echo "[gate] event=$EVENT KST=${H}시 proceed=$proceed slot=$mslot ckey=$ckey"

      - name: Checkout (최신 data.json)
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/checkout@v5
        with:
          ref: ${{ github.ref_name || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        if: steps.gate.outputs.proceed == 'true'
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install chart deps
        if: steps.gate.outputs.proceed == 'true'
        run: pip install matplotlib requests

      # 중복 발송 방지 마커: 같은 슬롯이 그날 이미 발송했으면 cache-hit=true → 발송 건너뜀.
      # 수동 실행(slot=manual)은 마커를 쓰지 않아 언제든 발송된다.
      - name: 중복 발송 방지 마커 복원
        if: steps.gate.outputs.proceed == 'true' && steps.gate.outputs.slot != 'manual'
        id: marker
        uses: actions/cache@v4
        with:
          path: .kakao_sent_marker
          key: kakao-sent-${{ steps.gate.outputs.date }}-${{ steps.gate.outputs.ckey }}

      - name: Send KakaoTalk digest
        if: steps.gate.outputs.proceed == 'true' && steps.marker.outputs.cache-hit != 'true'
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          KAKAO_SLOT: ${{ steps.gate.outputs.slot }}
          KAKAO_CHARTS: ${{ vars.KAKAO_CHARTS || '1' }}
        run: |
          python scripts/send_kakao_digest.py
          touch .kakao_sent_marker   # 발송 성공 후에만 마커 생성(실패 시 -e 로 중단 → 다음 깨움이 재시도)
