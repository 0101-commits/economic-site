name: KakaoTalk Daily Digest (10·15·22 KST)

# 매일 10시·15시·22시(KST) 무렵 data.json 시황을 카카오톡 '나에게 보내기'로 발송한다.
# 슬롯마다 지수/환율 차트 이미지 1장을 함께 보낸다(피드):
#   10시(아침)=나스닥·S&P500 / 15시(오후)=코스피·달러원 / 22시(마감)=코스피·나스닥.
#   (차트 생성/업로드 실패 시 텍스트로 자동 폴백. 이미지를 끄려면 변수 KAKAO_CHARTS=0.)
#
# ⏰ 발송 시각을 '매시 정각(0분)' 에 걸지 않는 이유:
#   GitHub Actions 스케줄은 best-effort 라 혼잡 시 지연·누락된다. 그중에서도 '매시 정각' 은
#   전 세계 워크플로가 한꺼번에 몰려 가장 혼잡한 슬롯이라 수십 분 지연되거나 통째로 누락되기 쉽다.
#   (실제로 정각(0 1 * * *)으로 두었을 때 아침 발송이 매일 30~65분씩 밀리다 끝내 누락되는 사고 발생.)
#   → 정각을 피해 17분에 1차 발송하고, 그래도 누락될 때를 대비해 42분에 '보강(catch-up)' 을 한 번 더 둔다.
#     같은 슬롯의 1차·보강은 actions/cache 마커로 '하루 한 번만' 발송되도록 중복을 막는다
#     (1차가 정상 발송되면 보강은 건너뛰고, 1차가 누락된 날에만 보강이 실제 발송 — fail-open).
#   동일 패턴을 데이터 수집 워크플로(fetch-data.yml)도 'OO:30 보강' 으로 이미 사용 중.
#
# 사전 설정(1회) — 저장소 루트 KAKAO_SETUP.md 참고:
#   GitHub → Settings → Secrets and variables → Actions 에 아래 2개 등록
#     - KAKAO_REST_API_KEY   : 카카오 개발자 앱 REST API 키
#     - KAKAO_REFRESH_TOKEN  : talk_message scope 로 발급한 refresh_token
#   (선택) KAKAO_TEMPLATE_ID : 차트 발송이 꺼졌거나 실패했을 때 쓸 콘솔 커스텀 템플릿 ID
#   (선택) KAKAO_CHARTS=0     : 차트 이미지 발송 끄기 (기본 on)
#
# 테스트: Actions 탭에서 이 워크플로를 'Run workflow'(workflow_dispatch)로 즉시 수동 발송 가능.
#         (수동 실행은 중복 방지 마커를 쓰지 않으므로 언제든 곧바로 발송된다.)
on:
  schedule:
    - cron: '17 1 * * *'    # 10:17 KST (01:17 UTC) — 아침 (나스닥·S&P500) (1차)
    - cron: '42 1 * * *'    # 10:42 KST (01:42 UTC) — 아침 (보강: 1차 누락 시에만 발송)
    - cron: '17 6 * * *'    # 15:17 KST (06:17 UTC) — 오후 (코스피·달러원) (1차)
    - cron: '42 6 * * *'    # 15:42 KST (06:42 UTC) — 오후 (보강)
    - cron: '17 13 * * *'   # 22:17 KST (13:17 UTC) — 마감 (코스피·나스닥) (1차)
    - cron: '42 13 * * *'   # 22:42 KST (13:42 UTC) — 마감 (보강)
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: kakao-daily-digest
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (최신 data.json)
        uses: actions/checkout@v5
        with:
          # 스케줄 발화는 기본 브랜치(main)에서 도므로 github.ref_name=main → 평소 동작 동일.
          # 수동 실행(workflow_dispatch)은 선택한 브랜치를 체크아웃 → 새 스크립트/데이터로 파일럿 가능.
          ref: ${{ github.ref_name || 'main' }}
          fetch-depth: 1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      # 차트(matplotlib)·이미지 업로드(requests) 의존성. 스크립트는 둘이 없으면 텍스트로 폴백하지만,
      # 차트 피드를 기본 동작으로 쓰므로 여기서 설치한다.
      - name: Install chart deps
        run: pip install matplotlib requests

      # 발송 슬롯(morning/midday/close)과 날짜(UTC)를 계산한다.
      # 1차·보강 cron 을 같은 슬롯으로 묶어, 아래 캐시 마커가 '슬롯+날짜' 단위로 중복 발송을 막게 한다.
      # (세 슬롯 모두 01~13 UTC = 같은 UTC·KST 날짜이므로 UTC 날짜를 그대로 키로 쓴다.)
      - name: 발송 슬롯/날짜 계산
        id: slot
        run: |
          case "${{ github.event.schedule }}" in
            '17 1 * * *'|'42 1 * * *')   slot=morning ;;
            '17 6 * * *'|'42 6 * * *')   slot=midday ;;
            '17 13 * * *'|'42 13 * * *') slot=close ;;
            *)                            slot=manual ;;   # workflow_dispatch — 중복 방지 없이 항상 발송
          esac
          echo "slot=$slot"              >> "$GITHUB_OUTPUT"
          echo "date=$(date -u +%Y%m%d)" >> "$GITHUB_OUTPUT"

      # 중복 발송 방지 마커: 같은 슬롯이 그날 이미 발송했으면 캐시가 적중(cache-hit=true)한다.
      # exact key 만 사용(restore-keys 없음) — 다른 날/슬롯의 마커가 잘못 복원되어 발송이 '막히는' 일 방지.
      # 키가 처음이면(=아직 미발송) miss → 아래 발송 step 이 돌고 마커 파일을 만들어 post 단계에서 캐시에 저장.
      - name: 중복 발송 방지 마커 복원
        if: steps.slot.outputs.slot != 'manual'
        id: marker
        uses: actions/cache@v4
        with:
          path: .kakao_sent_marker
          key: kakao-sent-${{ steps.slot.outputs.date }}-${{ steps.slot.outputs.slot }}

      - name: Send KakaoTalk digest
        # 이번 슬롯이 아직 미발송(cache-hit≠true)이거나 수동 실행일 때만 발송.
        # (보강 실행인데 1차가 이미 보냈으면 cache-hit=true → 건너뜀 → 중복 발송 없음.)
        if: steps.marker.outputs.cache-hit != 'true'
        env:
          KAKAO_REST_API_KEY: ${{ secrets.KAKAO_REST_API_KEY }}
          KAKAO_REFRESH_TOKEN: ${{ secrets.KAKAO_REFRESH_TOKEN }}
          # 슬롯을 스크립트에 전달 → 어떤 차트를 그릴지 결정 (manual 은 KST 시각으로 추정).
          KAKAO_SLOT: ${{ steps.slot.outputs.slot }}
          # 차트 이미지 발송 on/off (기본 on). 끄려면 저장소 변수 KAKAO_CHARTS=0.
          KAKAO_CHARTS: ${{ vars.KAKAO_CHARTS || '1' }}
          # 차트가 꺼졌거나 실패했을 때만 쓰는 콘솔 커스텀 템플릿(미설정 시 텍스트).
          KAKAO_TEMPLATE_ID: ${{ secrets.KAKAO_TEMPLATE_ID || vars.KAKAO_TEMPLATE_ID }}
        run: |
          python scripts/send_kakao_digest.py
          # 발송 성공 후에만 마커 생성(위 python 이 실패하면 -e 로 여기서 멈춰 마커 미생성 → 보강이 재시도).
          touch .kakao_sent_marker
