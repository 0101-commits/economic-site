# Cloudflare Worker 설정 — 경제 대시보드 CORS 프록시
# 배포:  cd cloudflare-worker && npx wrangler deploy   (README.md 참고)
#
# 무료(Free) 플랜으로 충분합니다 — 하루 100,000 요청 무료.
# (대시보드는 사용자 1명당 장중 분당 수 회 호출 수준이라 여유롭습니다.)

name = "econ-dashboard-proxy"
main = "worker.js"
compatibility_date = "2024-11-01"

# 관측/로그가 필요하면 주석 해제
# [observability]
# enabled = true

# 커스텀 도메인을 쓰려면 routes 설정 (선택). 기본은 *.workers.dev 서브도메인.
# [[routes]]
# pattern = "proxy.example.com/*"
# zone_name = "example.com"
